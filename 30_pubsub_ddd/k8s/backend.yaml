apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: chat-backend-ddd:latest
          imagePullPolicy: Never
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://user:password@postgres:5432/chat_db"
            - name: ALLOWED_ORIGIN
              value: "http://localhost:3000"
            - name: REDIS_URL
              value: "redis://redis:6379"
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  type: LoadBalancer
  selector:
    app: backend
  ports:
    - port: 8000
